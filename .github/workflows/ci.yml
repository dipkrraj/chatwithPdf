name: DverseAI CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          cd fastAPi
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Tests with Coverage
        run: |
          cd fastAPi
          pytest tests/ -v

  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-size: '18'
          cache: 'npm'
          cache-dependency-path: frontEnd/package-lock.json

      - name: Install Dependencies
        run: |
          cd frontEnd
          npm ci

      - name: Run Production Build Verify
        run: |
          cd frontEnd
          npm run build
